<div class="form-page">

  <!-- Cabeçalho -->
  <div class="page-header">
    <div class="page-header__back">
      <p-button icon="pi pi-arrow-left" severity="secondary" [text]="true"
                (onClick)="cancelar()" pTooltip="Voltar" tooltipPosition="right" />
      <h1 class="page-titulo">{{ editando ? 'Editar Material' : 'Novo Material' }}</h1>
    </div>
  </div>

  <!-- Skeleton (edição carregando) -->
  <ng-container *ngIf="carregando">
    <div class="form-card">
      <p-skeleton width="140px" height="18px" styleClass="mb-4" />
      <div class="form-grid">
        <div class="field" *ngFor="let f of [1,2,3,4]">
          <p-skeleton width="100px" height="13px" styleClass="mb-2" />
          <p-skeleton height="38px" />
        </div>
      </div>
    </div>
  </ng-container>

  <!-- Formulário -->
  <form *ngIf="!carregando" [formGroup]="form" (ngSubmit)="salvar()">

    <!-- Seção: Dados Básicos -->
    <div class="form-card">
      <h2 class="form-section-title">Dados Básicos</h2>

      <div class="form-grid">

        <!-- Nome -->
        <div class="field full-width">
          <label class="field-label" for="nome">Nome do Material *</label>
          <input pInputText id="nome" formControlName="nome" placeholder="Ex: Camisa DryFit" class="w-full" />
          <small class="p-error" *ngIf="form.get('nome')?.invalid && form.get('nome')?.touched">
            Nome é obrigatório.
          </small>
        </div>

        <!-- Tipo -->
        <div class="field">
          <label class="field-label" for="tipo">Tipo *</label>
          <p-dropdown id="tipo" formControlName="tipo"
                      [options]="opcoesTipo" optionLabel="label" optionValue="value"
                      class="w-full" />
        </div>

        <!-- Permite Sublimação -->
        <div class="field field--checkbox">
          <p-checkbox formControlName="permite_sublimacao" [binary]="true" inputId="permite_sub" />
          <label for="permite_sub">Permite Sublimação</label>
        </div>

        <!-- Descrição -->
        <div class="field full-width">
          <label class="field-label" for="descricao">Descrição</label>
          <textarea pTextarea id="descricao" formControlName="descricao"
                    rows="3" class="w-full"
                    placeholder="Descreva o material..."></textarea>
        </div>

        <!-- Ativo -->
        <div class="field field--checkbox">
          <p-checkbox formControlName="ativo" [binary]="true" inputId="ativo" />
          <label for="ativo">Material Ativo</label>
        </div>

      </div>
    </div>

    <!-- Seção: Tamanhos e Preços -->
    <div class="form-card">
      <div class="tamanhos-header">
        <h2 class="form-section-title">Tamanhos e Preços</h2>
        <p-button label="Adicionar Tamanho" icon="pi pi-plus" severity="secondary"
                  [outlined]="true" size="small" type="button"
                  (onClick)="adicionarTamanho()" />
      </div>

      <p *ngIf="tamanhos.length === 0" class="tamanhos-empty">
        Nenhum tamanho adicionado. Clique em "Adicionar Tamanho".
      </p>

      <div formArrayName="tamanhos">
        <div class="tamanho-row" *ngFor="let ctrl of tamanhos.controls; let i = index"
             [formGroupName]="i">

          <div class="tamanho-grid">

            <!-- Tamanho -->
            <div class="field">
              <label class="field-label">Tamanho *</label>
              <p-dropdown formControlName="tamanho"
                          [options]="opcoesTamanho" optionLabel="label" optionValue="value"
                          placeholder="Selecione" class="w-full" />
              <small class="p-error"
                     *ngIf="ctrl.get('tamanho')?.invalid && ctrl.get('tamanho')?.touched">
                Obrigatório.
              </small>
            </div>

            <!-- Preço Unitário -->
            <div class="field">
              <label class="field-label">Preço Unit. (R$) *</label>
              <p-inputNumber formControlName="preco_unitario" mode="decimal"
                             [minFractionDigits]="2" [maxFractionDigits]="2"
                             [min]="0" class="w-full" />
              <small class="p-error"
                     *ngIf="ctrl.get('preco_unitario')?.invalid && ctrl.get('preco_unitario')?.touched">
                Preço inválido.
              </small>
            </div>

            <!-- Preço Atacado -->
            <div class="field">
              <label class="field-label">Preço Atacado (R$) *</label>
              <p-inputNumber formControlName="preco_atacado" mode="decimal"
                             [minFractionDigits]="2" [maxFractionDigits]="2"
                             [min]="0" class="w-full" />
              <small class="p-error"
                     *ngIf="ctrl.get('preco_atacado')?.invalid && ctrl.get('preco_atacado')?.touched">
                Preço inválido.
              </small>
            </div>

            <!-- Qtd Mínima Atacado -->
            <div class="field">
              <label class="field-label">Qtd. Mín. Atacado *</label>
              <p-inputNumber formControlName="qtd_minima_atacado"
                             [min]="1" [showButtons]="true" class="w-full" />
              <small class="p-error"
                     *ngIf="ctrl.get('qtd_minima_atacado')?.invalid && ctrl.get('qtd_minima_atacado')?.touched">
                Mínimo 1.
              </small>
            </div>

            <!-- Estoque -->
            <div class="field">
              <label class="field-label">Estoque</label>
              <p-inputNumber formControlName="estoque"
                             [min]="0" [showButtons]="true" class="w-full" />
            </div>

            <!-- Ativo + Remover -->
            <div class="field field--acoes">
              <div class="tamanho-acoes">
                <div class="tamanho-ativo">
                  <p-checkbox formControlName="ativo" [binary]="true"
                              [inputId]="'ativo-' + i" />
                  <label [for]="'ativo-' + i">Ativo</label>
                </div>
                <p-button icon="pi pi-trash" severity="danger" [outlined]="true"
                          size="small" type="button"
                          [disabled]="tamanhos.length === 1"
                          (onClick)="removerTamanho(i)" />
              </div>
            </div>

          </div>

        </div>
      </div>

    </div>

    <!-- Ações -->
    <div class="form-acoes">
      <p-button label="Cancelar" severity="secondary" [outlined]="true"
                type="button" (onClick)="cancelar()" />
      <p-button [label]="salvando ? 'Salvando...' : (editando ? 'Atualizar' : 'Criar Material')"
                icon="pi pi-check" type="submit"
                [loading]="salvando" styleClass="btn-accent" />
    </div>

  </form>

  <p-toast />

</div>
